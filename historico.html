<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Histórico</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial;
  background:#fff;
  margin-top:60px;
  padding-bottom:90px;
}

.topo{
  position:fixed;
  top:0;
  left:0;
  right:0;
  background:#8B4513;
  color:#fff;
  padding:4px;
  display:flex;
  justify-content:flex-end;
  align-items:center;
}

.voltar-btn{
  width:40px;
  height:40px;
  background:#eee;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}

.voltar-btn svg{
  width:20px;
  height:20px;
  stroke:#8B4513;
}

.conteudo{
  padding:15px;
}

.card{
  border:1px solid #eee;
  border-radius:10px;
  padding:10px;
  margin-bottom:15px;
}

.botao{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.repetir{background:#25D366;}
.excluir{background:#d9534f;}

/* MENU IGUAL AO INDEX */
.menu {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
  border-top:1px solid #eee;
}

.menu a {
  text-align:center;
  font-size:12px;
  color:#555;
  text-decoration:none;
}

.menu svg {
  width:26px;
  height:26px;
  display:block;
  margin:auto;
  margin-bottom:4px;
  stroke:#555;
}
</style>
</head>

<body>

<div class="topo">
<a href="javascript:void(0)" onclick="voltar()" class="voltar-btn">
<svg viewBox="0 0 24 24" fill="none" stroke-width="2">
<path d="M15 18l-6-6 6-6"/>
</svg>
</a>
</div>

<div class="conteudo">
<h2>Últimos pedidos</h2>
<div id="lista"></div>
</div>

<!-- MENU IGUAL AO INDEX -->
<div class="menu">

<a href="index.html">
<svg viewBox="0 0 24 24" fill="none" stroke-width="2">
<path d="M3 10 L12 3 L21 10 V21 H3 Z"/>
</svg>
Início
</a>

<a href="#">
<svg viewBox="0 0 24 24" fill="none" stroke-width="2">
<circle cx="7" cy="7" r="2"></circle>
<circle cx="17" cy="17" r="2"></circle>
<line x1="7" y1="17" x2="17" y2="7"></line>
</svg>
Promoções
</a>

<a href="carrinho.html" style="position:relative;">
<span id="qtdCarrinho" style="
position:absolute;
top:-5px;
right:-10px;
background:red;
color:#fff;
font-size:10px;
padding:2px 6px;
border-radius:10px;
">0</span>

<svg viewBox="0 0 24 24" fill="none" stroke-width="2">
<circle cx="9" cy="21" r="1"/>
<circle cx="20" cy="21" r="1"/>
<path d="M1 1 H5 L7 14 H19 L23 6 H6"/>
</svg>
Carrinho
</a>

<a href="perfil.html">
<svg viewBox="0 0 24 24" fill="none" stroke-width="2">
<circle cx="12" cy="8" r="4"/>
<path d="M4 21 C4 16,20 16,20 21"/>
</svg>
Perfil
</a>

</div>

<script>
function voltar(){
  if(history.length > 1){
    history.back();
  }else{
    window.location.href = "index.html";
  }
}

let lista = document.getElementById("lista");
let pedidos = JSON.parse(localStorage.getItem("pedidos")) || [];

function atualizarCarrinho(){
  let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
  let total = 0;

  carrinho.forEach(item=>{
    total += item.quantidade;
  });

  let badge = document.getElementById("qtdCarrinho");
  if(badge){
    badge.innerText = total;
  }
}

function render(){
  lista.innerHTML = "";

  if(pedidos.length === 0){
    lista.innerHTML = "<p>Nenhum pedido ainda</p>";
    return;
  }

  pedidos.forEach((pedido, index)=>{
    let div = document.createElement("div");
    div.className = "card";

    let itens = "";
    pedido.itens.forEach(i=>{
      itens += `${i.quantidade}x ${i.nome}<br>`;

      if(i.extras){
        i.extras.forEach(extra=>{
          itens += `+${extra.quantidade}x ${extra.nome}<br>`;
        });
      }
    });

    div.innerHTML = `
      <strong>${pedido.data}</strong><br><br>
      ${itens}<br>
      <strong>Total: R$ ${pedido.total.toFixed(2)}</strong><br><br>

      ${pedido.nome}<br>
      ${pedido.telefone}<br>
      ${pedido.endereco}<br>
      ${pedido.pagamento}<br>

      <button class="botao repetir" onclick="repetir(${index})">Pedir novamente</button>
      <button class="botao excluir" onclick="excluir(${index})">Apagar</button>
    `;

    lista.appendChild(div);
  });
}

function repetir(index){
  let carrinho = pedidos[index].itens;
  localStorage.setItem("carrinho", JSON.stringify(carrinho));
  window.location.href = "carrinho.html";
}

function excluir(index){
  pedidos.splice(index,1);
  localStorage.setItem("pedidos", JSON.stringify(pedidos));
  render();
}

atualizarCarrinho();
render();
</script>

</body>
</html>
