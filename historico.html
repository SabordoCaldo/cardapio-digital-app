<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Histórico</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial;
  background:#fff;
  margin-top:60px;
  padding-bottom:90px;
}

.topo{
  position:fixed;
  top:0;
  left:0;
  right:0;
  background:#8B4513;
  color:#fff;
  padding:4px;
  display:flex;
  justify-content:flex-end;
  align-items:center;
}

.voltar-btn{
  width:40px;
  height:40px;
  background:#eee;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}

.voltar-btn svg{
  width:20px;
  height:20px;
  stroke:#8B4513;
}

.conteudo{
  padding:15px;
}

.card{
  border:1px solid #eee;
  border-radius:10px;
  padding:10px;
  margin-bottom:15px;
}

.botao{
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.repetir{background:#25D366;}
.excluir{background:#d9534f;}

.menu{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  border-top:1px solid #eee;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
}

.item-menu{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center; /* 🔥 ADICIONADO */
  font-size:12px;
  color:#555;
  text-decoration:none;
  position:relative;
  height:60px; /* 🔥 ADICIONADO */
}

.item-menu svg{
  width:26px;
  height:26px;
  stroke:#555;
  margin-bottom:4px;
}

.badge{
  position:absolute;
  top:-5px;
  right:-10px;
  background:red;
  color:#fff;
  font-size:10px;
  padding:2px 6px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="topo">
<a href="javascript:void(0)" onclick="voltar()" class="voltar-btn">
<svg viewBox="0 0 24 24" fill="none" stroke-width="2">
<path d="M15 18l-6-6 6-6"/>
</svg>
</a>
</div>

</div>

</svg>

<line x1="7" y1="17" x2="17" y2="7"></line>
</svg>

</a>

<a href="carrinho.html" class="item-menu">
<span id="qtdCarrinho" class="badge">0</span>
<svg viewBox="0 0 24 24" fill="none" stroke-width="2">
<circle cx="9" cy="20" r="1"/>

<path d="M5 6h2l1 7h9l2-5H7"/>

</svg>

</div>

</html>
