<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refrigerante Lata</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#fff;
  margin-top:60px;
}

.topo {
  position:fixed;
  top:0;
  left:0;
  right:0;
  background:#8B4513;
  color:#fff;
  padding:12px;
  z-index:1000;
}

.topo a {
  color:#fff;
  text-decoration:none;
}

/* ícone carrinho */
#iconeCarrinho {
  float:right;
  font-weight:bold;
}

/* imagem */
.img {
  width:100%;
  height:320px;
  object-fit:cover;
}

.conteudo {
  padding:15px;
}

.preco {
  font-size:22px;
  font-weight:bold;
  margin-top:10px;
}

/* itens */
.item {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
  padding:10px;
  border-radius:8px;
}

/* contador */
.contador {
  display:flex;
  align-items:center;
  gap:8px;
}

.contador button {
  width:32px;
  height:32px;
  border:none;
  border-radius:8px;
  font-size:18px;
  cursor:pointer;
  transition:0.15s;
}

/* cores originais */
.menos {
  background:#ccc;
}

.mais {
  background:#8B4513;
  color:#fff;
}

/* efeito toque */
.contador button:active {
  transform:scale(0.9);
}

/* botão principal */
.botao {
  display:block;
  text-align:center;
  padding:14px;
  margin-top:20px;
  border-radius:12px;
  text-decoration:none;
  font-weight:bold;
  background:#25D366;
  color:#fff;
  transition:0.2s;
}

.botao:active {
  transform:scale(0.97);
}
</style>
</head>

<body>

<div class="topo">
<a href="index.html">← Voltar</a>

<a href="carrinho.html" id="iconeCarrinho" style="color:#fff;">
🛒 <span id="qtdCarrinho">0</span>
</a>
</div>

<img src="img/bebidas/lata.jpg" class="img">

<div class="conteudo">

<h2>Refrigerante Lata 350ml</h2>

<p>Escolha entre Coca-Cola, Coca Zero, Fanta ou Guaraná.</p>

<div class="preco">R$ 6,50</div>

<h3 style="margin-top:20px;">Escolha seu sabor</h3>

<div>

<div class="item">
<span>Coca-Cola</span>
<div class="contador">
<button class="menos" onclick="alterar(this, -1)">-</button>
<span>0</span>
<button class="mais" onclick="alterar(this, 1)">+</button>
</div>
</div>

<div class="item">
<span>Coca-Cola Zero</span>
<div class="contador">
<button class="menos" onclick="alterar(this, -1)">-</button>
<span>0</span>
<button class="mais" onclick="alterar(this, 1)">+</button>
</div>
</div>

<div class="item">
<span>Fanta Laranja</span>
<div class="contador">
<button class="menos" onclick="alterar(this, -1)">-</button>
<span>0</span>
<button class="mais" onclick="alterar(this, 1)">+</button>
</div>
</div>

<div class="item">
<span>Guaraná Antártica</span>
<div class="contador">
<button class="menos" onclick="alterar(this, -1)">-</button>
<span>0</span>
<button class="mais" onclick="alterar(this, 1)">+</button>
</div>
</div>

</div>

<a href="#" class="botao" onclick="adicionarCarrinho()">
Adicionar ao carrinho
</a>

<div style="height:80px;"></div>

</div>

<!-- TOAST -->
<div id="toast" style="
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#333;
color:#fff;
padding:12px 20px;
border-radius:8px;
opacity:0;
transition:0.3s;
z-index:2000;
">
Adicionado ao carrinho ✅
</div>

<script>
function alterar(botao, valor) {
  let numero = botao.parentElement.querySelector("span");
  let atual = parseInt(numero.innerText);

  atual += valor;
  if (atual < 0) atual = 0;

  numero.innerText = atual;
}

function adicionarCarrinho() {
  let itens = document.querySelectorAll(".item");
  let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];

  let adicionou = false;

  itens.forEach(item => {
    let nome = item.querySelector("span").innerText;
    let qtd = parseInt(item.querySelector(".contador span").innerText);

    if (qtd > 0) {
      carrinho.push({
        nome: nome,
        quantidade: qtd,
        preco: 6.5
      });

      adicionou = true;
    }
  });

  if (!adicionou) {
    alert("Selecione pelo menos 1 item");
    return;
  }

  localStorage.setItem("carrinho", JSON.stringify(carrinho));

  mostrarToast();
  atualizarCarrinho();
}

function mostrarToast() {
  let toast = document.getElementById("toast");
  toast.style.opacity = "1";

  setTimeout(() => {
    toast.style.opacity = "0";
  }, 2000);
}

function atualizarCarrinho() {
  let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
  let total = 0;

  carrinho.forEach(item => {
    total += item.quantidade;
  });

  document.getElementById("qtdCarrinho").innerText = total;
}

atualizarCarrinho();
</script>

</body>
</html>
