<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refrigerante Lata</title>

<style>
body { margin:0; font-family:Arial; background:#fff; }

.topo {
  background:#8B4513;
  color:#fff;
  padding:12px;
}

.topo a {
  color:#fff;
  text-decoration:none;
}

.img {
  width:100%;
  height:320px;
  object-fit:cover;
}

.conteudo {
  padding:15px;
}

.preco {
  font-size:22px;
  font-weight:bold;
  margin-top:10px;
}

/* ITENS */
.item {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
  padding:10px;
  border-radius:8px;
}

/* CONTADOR */
.contador {
  display:flex;
  align-items:center;
  gap:8px;
}

.contador button {
  width:32px;
  height:32px;
  border:none;
  border-radius:8px;
  font-size:18px;
  cursor:pointer;
  transition:0.15s;
}

/* efeito toque */
.contador button:active {
  transform:scale(0.9);
}

/* BOTÃO PRINCIPAL */
.botao {
  display:block;
  text-align:center;
  padding:14px;
  margin-top:20px;
  border-radius:12px;
  text-decoration:none;
  font-weight:bold;
  background:#8B4513;
  color:#fff;
  transition:0.2s;
}

.botao:active {
  transform:scale(0.97);
}
</style>
</head>

<body>

<div class="topo">
<a href="index.html">← Voltar</a>
</div>

<img src="img/bebidas/lata.jpg" class="img">

<div class="conteudo">

<h2>Refrigerante Lata 350ml</h2>

<p>Escolha entre Coca-Cola, Coca Zero, Fanta ou Guaraná.</p>

<div class="preco">R$ 6,50</div>

<h3 style="margin-top:20px; margin-bottom:10px;">
Escolha seu sabor
</h3>

<div>

<!-- COCA -->
<div class="item">
<span>Coca-Cola</span>
<div class="contador">
<button onclick="alterar(this, -1)">-</button>
<span>0</span>
<button onclick="alterar(this, 1)">+</button>
</div>
</div>

<!-- COCA ZERO -->
<div class="item">
<span>Coca-Cola Zero</span>
<div class="contador">
<button onclick="alterar(this, -1)">-</button>
<span>0</span>
<button onclick="alterar(this, 1)">+</button>
</div>
</div>

<!-- FANTA -->
<div class="item">
<span>Fanta Laranja</span>
<div class="contador">
<button onclick="alterar(this, -1)">-</button>
<span>0</span>
<button onclick="alterar(this, 1)">+</button>
</div>
</div>

<!-- GUARANÁ -->
<div class="item">
<span>Guaraná Antártica</span>
<div class="contador">
<button onclick="alterar(this, -1)">-</button>
<span>0</span>
<button onclick="alterar(this, 1)">+</button>
</div>
</div>

</div>

<a href="#" class="botao">
Adicionar ao carrinho
</a>

</div>

<script>
function alterar(botao, valor) {
  let numero = botao.parentElement.querySelector("span");
  let atual = parseInt(numero.innerText);

  atual += valor;

  if (atual < 0) atual = 0;

  numero.innerText = atual;
}
</script>

</body>
</html>
