<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrinho</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#fff;
  margin-top:60px;
  padding-bottom:100px;
}

.topo {
  position:fixed;
  top:0;
  left:0;
  right:0;
  background:#8B4513;
  color:#fff;
  padding:4px;
  display:flex;
  justify-content:flex-end;
  align-items:center;
  z-index:1000;
}

.topo a {
  color:#fff;
  text-decoration:none;
}

/* BOTÃO VOLTAR */
.voltar-btn{
  width:40px;
  height:40px;
  background:#eee;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}

.voltar-btn svg{
  width:20px;
  height:20px;
  stroke:#8B4513;
}

.conteudo {
  padding:15px;
  padding-bottom:140px;
}

.item {
  border-bottom:1px solid #eee;
  padding:12px 0;
}

.contador {
  display:flex;
  align-items:center;
  gap:8px;
}

.contador button {
  width:32px;
  height:32px;
  border:none;
  border-radius:8px;
  font-size:18px;
}

.menos { background:#ccc; }
.mais { background:#8B4513; color:#fff; }

.total {
  font-size:20px;
  font-weight:bold;
  margin-top:15px;
}

#avisoMinimo, #avisoBebida {
  color:#d9534f;
  font-weight:bold;
  margin-top:10px;
  display:none;
}

input, select {
  width:100%;
  max-width:100%;
  box-sizing:border-box;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:16px;
}

select { height:45px; }

/* BOTÃO */
.botao {
  position:fixed;
  bottom:80px;
  left:10px;
  right:10px;
  z-index:1000;
  text-align:center;
  padding:14px;
  border-radius:12px;
  text-decoration:none;
  font-weight:bold;
  background:#25D366;
  color:#fff;
}

/* MENU */
.menu{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  border-top:1px solid #eee;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
}

.item-menu{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:12px;
  color:#555;
  text-decoration:none;
}

.item-menu svg{
  width:24px;
  height:24px;
  stroke:#555;
  margin-bottom:4px;
}
</style>
</head>

<body>

<div class="topo">
<a href="#" onclick="voltar()" class="voltar-btn">
  <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
    <path d="M15 18l-6-6 6-6"/>
  </svg>
</a>
</div>

<div class="conteudo">

<h2>Seu Carrinho</h2>

<div id="lista"></div>

<div class="total" id="total"></div>

<div id="avisoMinimo"></div>
<div id="avisoBebida"></div>

<h3>Dados do Pedido</h3>

<input id="nome" placeholder="Seu nome">
<input id="telefone" placeholder="Telefone">
<input id="endereco" placeholder="Endereço">
<input id="referencia" placeholder="Referência (opcional)">

<select id="pagamento" onchange="verTroco()">
<option value="">Forma de pagamento</option>
<option>Dinheiro</option>
<option>Pix</option>
<option>Cartão</option>
</select>

<input id="troco" placeholder="Troco para quanto?" style="display:none;">

</div>

<a href="#" id="btnFinalizar" class="botao" onclick="finalizarPedido()">
Enviar Pedido
</a>

<!-- MENU INFERIOR -->
<div class="menu">

  <a href="index.html" class="item-menu">
    <svg fill="none" stroke-width="2" viewBox="0 0 24 24">
      <path d="M3 10L12 3l9 7"></path>
      <path d="M5 10v10h14V10"></path>
    </svg>
    Início
  </a>

  <a href="#" class="item-menu">
    <svg fill="none" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="7" cy="7" r="2"></circle>
      <circle cx="17" cy="17" r="2"></circle>
      <line x1="7" y1="17" x2="17" y2="7"></line>
    </svg>
    Promoções
  </a>

  <a href="carrinho.html" class="item-menu">
    <svg fill="none" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="9" cy="20" r="1"></circle>
      <circle cx="17" cy="20" r="1"></circle>
      <path d="M5 6h2l1 7h9l2-5H7"></path>
    </svg>
    Carrinho
  </a>

  <a href="#" class="item-menu">
    <svg fill="none" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="12" cy="8" r="4"></circle>
      <path d="M4 20c2-4 14-4 16 0"></path>
    </svg>
    Perfil
  </a>

</div>

<script>
function voltar(){
  if(history.length > 1){
    history.back();
  }else{
    window.location.href = "index.html";
  }
}

/* RESTO DO SEU SCRIPT SEM ALTERAÇÃO */
