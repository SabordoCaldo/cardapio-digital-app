<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrinho</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#fff;
  margin-top:60px;
}

.topo {
  position:fixed;
  top:0;
  left:0;
  right:0;
  background:#8B4513;
  color:#fff;
  padding:12px;
  z-index:1000;
}

.topo a {
  color:#fff;
  text-decoration:none;
}

.conteudo {
  padding:15px;
}

.item {
  padding:10px;
  border-bottom:1px solid #eee;
}

.total {
  font-size:20px;
  font-weight:bold;
  margin-top:15px;
}

.botao {
  display:block;
  text-align:center;
  padding:14px;
  margin-top:20px;
  border-radius:12px;
  text-decoration:none;
  font-weight:bold;
  background:#25D366;
  color:#fff;
}
</style>
</head>

<body>

<div class="topo">
<a href="index.html">← Voltar</a>
</div>

<div class="conteudo">

<h2>Seu Carrinho</h2>

<div id="lista"></div>

<div class="total" id="total"></div>

<a href="#" class="botao" onclick="finalizarPedido()">
Finalizar Pedido
</a>

</div>

<script>
let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
let lista = document.getElementById("lista");
let total = 0;

if (carrinho.length === 0) {
  lista.innerHTML = "<p>Seu carrinho está vazio</p>";
}

carrinho.forEach(item => {
  let div = document.createElement("div");
  div.className = "item";
  div.innerText = item.quantidade + "x " + item.nome;

  lista.appendChild(div);

  total += item.quantidade * item.preco;
});

document.getElementById("total").innerText = "Total: R$ " + total.toFixed(2);

function finalizarPedido() {
  let mensagem = "Pedido:%0A";

  carrinho.forEach(item => {
    mensagem += item.quantidade + " " + item.nome + "%0A";
  });

  mensagem += "%0ATotal: R$ " + total.toFixed(2);

  let telefone = "5599999999999"; // COLOCA SEU NÚMERO
  let url = `https://wa.me/${telefone}?text=${mensagem}`;

  window.open(url, "_blank");
}
</script>

</body>
</html>
