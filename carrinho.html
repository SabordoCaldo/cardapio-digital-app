<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrinho</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial;
  background:#fff;
  margin-top:60px;
  padding-bottom:180px;
  overflow-x:hidden;
}

.topo{
  position:fixed;
  top:0;
  left:0;
  right:0;
  background:#8B4513;
  color:#fff;
  padding:4px;
  display:flex;
  justify-content:flex-end;
  align-items:center;
}

.voltar-btn{
  width:40px;
  height:40px;
  background:#eee;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}

.voltar-btn svg{
  width:20px;
  height:20px;
  stroke:#8B4513;
}

.conteudo{
  padding:15px;
  padding-bottom:40px;
}

.item{
  border-bottom:1px solid #eee;
  padding:12px 0;
}

.total{
  font-size:20px;
  font-weight:bold;
  margin-top:15px;
}

input, select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

.botao{
  position:fixed;
  bottom:80px;
  left:10px;
  right:10px;
  background:#25D366;
  color:#fff;
  padding:14px;
  border-radius:12px;
  text-align:center;
  font-weight:bold;
}

/* MENU */
.menu{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  border-top:1px solid #eee;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
}

.item-menu{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:13px;
  color:#555;
  text-decoration:none;
  position:relative;
}

.item-menu svg{
  width:26px;
  height:26px;
  stroke:#555;
  margin-bottom:4px;
}

.badge{
  position:absolute;
  top:-5px;
  right:-10px;
  background:red;
  color:#fff;
  font-size:10px;
  padding:2px 6px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="topo">
<a href="javascript:void(0)" onclick="history.back()" class="voltar-btn">
<svg viewBox="0 0 24 24" fill="none" stroke-width="2">
<path d="M15 18l-6-6 6-6"/>
</svg>
</a>
</div>

<div class="conteudo" id="conteudo">
<h2>Seu Carrinho</h2>
</div>

<div class="botao" onclick="finalizarPedido()">Finalizar Pedido</div>

<!-- MENU COM ÍCONES -->
<div class="menu">

<a href="index.html" class="item-menu">
<svg fill="none" stroke-width="2" viewBox="0 0 24 24">
<path d="M3 10L12 3l9 7"></path>
<path d="M5 10v10h14V10"></path>
</svg>
Início
</a>

<a href="#" class="item-menu">
<svg fill="none" stroke-width="2" viewBox="0 0 24 24">
<circle cx="7" cy="7" r="2"></circle>
<circle cx="17" cy="17" r="2"></circle>
<line x1="7" y1="17" x2="17" y2="7"></line>
</svg>
Promoções
</a>

<a href="carrinho.html" class="item-menu">
<span id="badgeCarrinho" class="badge">0</span>
<svg fill="none" stroke-width="2" viewBox="0 0 24 24">
<circle cx="9" cy="20" r="1"/>
<circle cx="17" cy="20" r="1"/>
<path d="M5 6h2l1 7h9l2-5H7"/>
</svg>
Carrinho
</a>

<a href="perfil.html" class="item-menu">
<svg fill="none" stroke-width="2" viewBox="0 0 24 24">
<circle cx="12" cy="8" r="4"/>
<path d="M4 20c2-4 14-4 16 0"/>
</svg>
Perfil
</a>

</div>

<script>
let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
let container = document.getElementById("conteudo");

function atualizarBadge(){
let total = 0;
carrinho.forEach(item=> total += item.quantidade);
document.getElementById("badgeCarrinho").innerText = total;
}

function renderizar(){
container.innerHTML = "<h2>Seu Carrinho</h2>";
let total = 0;

if(carrinho.length === 0){
container.innerHTML += "<p>Seu carrinho está vazio</p>";
atualizarBadge();
return;
}

carrinho.forEach((item, index)=>{
let div = document.createElement("div");
div.className = "item";

let subtotal = item.quantidade * item.preco;
let extrasHtml = "";

if(item.extras){
item.extras.forEach(extra=>{
let subExtra = extra.quantidade * extra.preco;
subtotal += subExtra;

extrasHtml += `
<div style="display:flex; justify-content:space-between; margin-left:10px;">
<span>+${extra.quantidade}x ${extra.nome}</span>
<span>R$ ${subExtra.toFixed(2)}</span>
</div>
`;
});
}

total += subtotal;

div.innerHTML = `
<div style="display:flex; justify-content:space-between;">
<span>${item.nome}</span>
<span>R$ ${(item.quantidade * item.preco).toFixed(2)}</span>
</div>

${extrasHtml}

<div style="font-weight:bold; margin-top:5px;">
Subtotal: R$ ${subtotal.toFixed(2)}
</div>

<div style="display:flex; gap:10px; margin-top:8px;">
<button onclick="editarItem(${index})">Editar</button>
<button onclick="removerItem(${index})" style="background:red;color:#fff;">Excluir</button>
</div>
`;

container.appendChild(div);
});

container.innerHTML += `<div class="total">Total: R$ ${total.toFixed(2)}</div>`;

container.innerHTML += `
<h3>Dados do Pedido</h3>

<input id="nome" placeholder="Seu nome">
<input id="telefone" placeholder="Telefone">
<input id="endereco" placeholder="Endereço">
<input id="referencia" placeholder="Referência (opcional)">

<select id="pagamento" onchange="verTroco()">
<option value="">Forma de pagamento</option>
<option>Dinheiro</option>
<option>Pix</option>
<option>Cartão</option>
</select>

<input id="troco" placeholder="Troco para quanto?" style="display:none;">
`;

atualizarBadge();
}

function editarItem(index){
let item = carrinho[index];

localStorage.setItem("editandoItem", JSON.stringify({
index:index,
item:item
}));

window.location.href = "caldo-completo.html";
}

function removerItem(index){
carrinho.splice(index,1);
localStorage.setItem("carrinho", JSON.stringify(carrinho));
renderizar();
}

function verTroco(){
let pagamento = document.getElementById("pagamento").value;
document.getElementById("troco").style.display =
pagamento === "Dinheiro" ? "block" : "none";
}

function finalizarPedido(){

if(carrinho.length === 0){
alert("Seu carrinho está vazio");
return;
}

let total = 0;

carrinho.forEach(item=>{
let subtotal = item.quantidade * item.preco;

if(item.extras){
item.extras.forEach(extra=>{
subtotal += extra.quantidade * extra.preco;
});
}

total += subtotal;
});

let nome = document.getElementById("nome").value.trim();
let telefone = document.getElementById("telefone").value.trim();
let endereco = document.getElementById("endereco").value.trim();
let pagamento = document.getElementById("pagamento").value;

if(!nome || !telefone || !endereco || !pagamento){
alert("Preencha todos os campos");
return;
}

let mensagem = "*SABOR DO CALDO*%0A";

carrinho.forEach(item=>{
mensagem += `${item.quantidade}x ${item.nome}%0A`;

if(item.extras){
item.extras.forEach(extra=>{
mensagem += `+${extra.quantidade}x ${extra.nome}%0A`;
});
}

mensagem += "%0A";
});

mensagem += `*TOTAL: R$ ${total.toFixed(2)}*`;

window.open(`https://wa.me/5535999711358?text=${mensagem}`);
}

renderizar();
</script>

</body>
</html>
