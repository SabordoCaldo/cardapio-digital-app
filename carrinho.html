<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrinho</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial;
  background:#fff;
  margin-top:60px;
  padding-bottom:180px;
}

.topo{
  position:fixed;
  top:0;
  left:0;
  right:0;
  background:#8B4513;
  color:#fff;
  padding:4px;
  display:flex;
  justify-content:flex-end;
  align-items:center;
}

.voltar-btn{
  width:40px;
  height:40px;
  background:#eee;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}

.conteudo{
  padding:15px;
}

.item{
  border-bottom:1px solid #eee;
  padding:12px 0;
}

.total{
  font-size:20px;
  font-weight:bold;
  margin-top:15px;
}

input, select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

.botao{
  position:fixed;
  bottom:80px;
  left:10px;
  right:10px;
  background:#25D366;
  color:#fff;
  padding:14px;
  border-radius:12px;
  text-align:center;
  font-weight:bold;
}

.menu{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  border-top:1px solid #eee;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
}
</style>
</head>

<body>

<div class="topo">
<a href="javascript:void(0)" onclick="history.back()" class="voltar-btn">←</a>
</div>

<div class="conteudo" id="conteudo">
<h2>Seu Carrinho</h2>
</div>

<div class="botao" onclick="finalizarPedido()">Finalizar Pedido</div>

<div class="menu">
<a href="index.html">Início</a>
<a href="#">Promoções</a>
<a href="carrinho.html">Carrinho</a>
<a href="perfil.html">Perfil</a>
</div>

<script>
let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
let container = document.getElementById("conteudo");

function renderizar(){
container.innerHTML = "<h2>Seu Carrinho</h2>";
let total = 0;

if(carrinho.length === 0){
container.innerHTML += "<p>Seu carrinho está vazio</p>";
return;
}

carrinho.forEach((item, index)=>{
let div = document.createElement("div");
div.className = "item";

let subtotal = item.quantidade * item.preco;
let extrasHtml = "";

/* 🔥 ADICIONAIS VOLTARAM AQUI */
if(item.extras){
item.extras.forEach(extra=>{
let totalExtra = extra.quantidade * extra.preco;
subtotal += totalExtra;

extrasHtml += `
<div style="display:flex; justify-content:space-between; margin-left:10px;">
<span>+${extra.quantidade}x ${extra.nome}</span>
<span>R$ ${totalExtra.toFixed(2)}</span>
</div>
`;
});
}

total += subtotal;

div.innerHTML = `
<div style="display:flex; justify-content:space-between;">
<span>${item.quantidade}x ${item.nome}</span>
<span>R$ ${(item.quantidade * item.preco).toFixed(2)}</span>
</div>

${extrasHtml}

<div style="font-weight:bold; margin-top:5px;">
Subtotal: R$ ${subtotal.toFixed(2)}
</div>

<div style="margin-top:8px;">
<button onclick="removerItem(${index})" style="background:red;color:#fff;">Excluir</button>
</div>
`;

container.appendChild(div);
});

container.innerHTML += `<div class="total">Total: R$ ${total.toFixed(2)}</div>`;
}

function removerItem(index){
carrinho.splice(index,1);
localStorage.setItem("carrinho", JSON.stringify(carrinho));
renderizar();
}

function finalizarPedido(){
alert("Pedido enviado!");
}

renderizar();
</script>

</body>
</html>
