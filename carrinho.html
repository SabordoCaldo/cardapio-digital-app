<style>
body{
  margin:0;
  font-family:Arial;
  background:#fff;
  margin-top:60px;

}

.topo{
  position:fixed;
  top:0;
  left:0;
  right:0;
  background:#8B4513;
  color:#fff;
  padding:4px;
  display:flex;
  justify-content:flex-end;
  align-items:center;
}

.voltar-btn{
  width:40px;
  height:40px;
  background:#eee;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}

.voltar-btn svg{
  width:20px;
  height:20px;
  stroke:#8B4513;
}

.conteudo{
  padding:15px;
  padding-bottom:140px;
}

.item{
  border-bottom:1px solid #eee;
  padding:12px 0;
}

.total{
  font-size:20px;
  font-weight:bold;
  margin-top:15px;
}

/* BOTÃO */
.botao{
  position:fixed;
  bottom:80px;
  left:10px;
  right:10px;
  background:#25D366;
  color:#fff;
  padding:14px;
  border-radius:12px;
  text-align:center;
}

/* MENU */
.menu{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  border-top:1px solid #eee;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
}

.item-menu{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:12px;
  color:#555;
  text-decoration:none;
}

.item-menu svg{
  width:24px;
  height:24px;
  stroke:#555;
  margin-bottom:4px;
}
</style>
</head>

<body>
