<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrinho</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#fff;
  padding-bottom:120px;
}

.topo{
  background:#8B4513;
  color:#fff;
  padding:12px;
}

.conteudo{
  padding:15px;
}

.item{
  border-bottom:1px solid #eee;
  padding:12px 0;
}

.total{
  font-size:20px;
  font-weight:bold;
  margin-top:15px;
}

input, select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

.botao{
  position:fixed;
  bottom:10px;
  left:10px;
  right:10px;
  background:#25D366;
  color:#fff;
  padding:14px;
  border-radius:12px;
  text-align:center;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="topo">
<h2>Seu Carrinho</h2>
</div>

<div class="conteudo" id="conteudo"></div>

<div class="botao" onclick="finalizarPedido()">Finalizar Pedido</div>

<script>
let carrinho = [];

try{
  carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
}catch(e){
  carrinho = [];
}

let container = document.getElementById("conteudo");

function renderizar(){

  if(!container) return;

  container.innerHTML = "";
  let total = 0;

  if(!Array.isArray(carrinho) || carrinho.length === 0){
    container.innerHTML = "<p>Seu carrinho está vazio</p>";
    return;
  }

  carrinho.forEach((item, index)=>{

    // 🛑 PROTEÇÃO TOTAL
    if(!item || !item.nome || !item.quantidade){
      return;
    }

    let preco = Number(item.preco) || 0;
    let quantidade = Number(item.quantidade) || 0;

    let subtotal = preco * quantidade;
    let extrasHtml = "";

    if(item.extras && Array.isArray(item.extras)){
      item.extras.forEach(extra=>{
        if(!extra) return;

        let q = Number(extra.quantidade) || 0;
        let p = Number(extra.preco) || 0;

        let totalExtra = q * p;
        subtotal += totalExtra;

        extrasHtml += `
        <div style="display:flex; justify-content:space-between; margin-left:10px;">
          <span>+${q}x ${extra.nome}</span>
          <span>R$ ${totalExtra.toFixed(2)}</span>
        </div>
        `;
      });
    }

    total += subtotal;

    let div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <div style="display:flex; justify-content:space-between;">
        <span>${quantidade}x ${item.nome}</span>
        <span>R$ ${(quantidade * preco).toFixed(2)}</span>
      </div>

      ${extrasHtml}

      <div style="font-weight:bold; margin-top:5px;">
        Subtotal: R$ ${subtotal.toFixed(2)}
      </div>

      <button onclick="removerItem(${index})" style="margin-top:10px;background:red;color:#fff;padding:6px 10px;border:none;border-radius:6px;">
        Excluir
      </button>
    `;

    container.appendChild(div);
  });

  container.innerHTML += `<div class="total">Total: R$ ${total.toFixed(2)}</div>`;

  container.innerHTML += `
    <h3>Dados do Pedido</h3>

    <input id="nome" placeholder="Seu nome">
    <input id="telefone" placeholder="Telefone">
    <input id="endereco" placeholder="Endereço">

    <select id="pagamento">
      <option value="">Forma de pagamento</option>
      <option>Dinheiro</option>
      <option>Pix</option>
      <option>Cartão</option>
    </select>
  `;
}

function removerItem(index){
  carrinho.splice(index,1);
  localStorage.setItem("carrinho", JSON.stringify(carrinho));
  renderizar();
}

function finalizarPedido(){

  if(!Array.isArray(carrinho) || carrinho.length === 0){
    alert("Seu carrinho está vazio");
    return;
  }

  let temComida = carrinho.some(item => item.tipo === "comida");

  if(!temComida){
    alert("Adicione pelo menos 1 caldo ao pedido");
    return;
  }

  let total = 0;

  carrinho.forEach(item=>{
    total += (item.quantidade || 0) * (item.preco || 0);

    if(item.extras){
      item.extras.forEach(extra=>{
        total += (extra.quantidade || 0) * (extra.preco || 0);
      });
    }
  });

  if(total < 20){
    alert("Pedido mínimo de R$20,00");
    return;
  }

  let nome = document.getElementById("nome").value.trim();
  let telefone = document.getElementById("telefone").value.trim();
  let endereco = document.getElementById("endereco").value.trim();
  let pagamento = document.getElementById("pagamento").value;

  if(!nome || !telefone || !endereco || !pagamento){
    alert("Preencha todos os campos");
    return;
  }

  alert("Pedido enviado com sucesso!");
}

renderizar();
</script>

</body>
</html>
