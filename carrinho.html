<script>
let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
let container = document.getElementById("conteudo");

function atualizarBadge(){
  let total = 0;
  carrinho.forEach(item => total += item.quantidade);

  let badge = document.getElementById("badgeCarrinho");
  if(badge) badge.innerText = total;
}

function renderizar(){
  if(!container) return;

  container.innerHTML = "<h2>Seu Carrinho</h2>";
  let total = 0;

  if(!carrinho || carrinho.length === 0){
    container.innerHTML += "<p>Seu carrinho está vazio</p>";
    atualizarBadge();
    return;
  }

  carrinho.forEach((item, index)=>{
    if(!item) return;

    let div = document.createElement("div");
    div.className = "item";

    let preco = item.preco || 0;
    let quantidade = item.quantidade || 0;

    let subtotal = quantidade * preco;
    let extrasHtml = "";

    if(item.extras && Array.isArray(item.extras)){
      item.extras.forEach(extra=>{
        let totalExtra = (extra.quantidade || 0) * (extra.preco || 0);
        subtotal += totalExtra;

        extrasHtml += `
        <div style="display:flex; justify-content:space-between; margin-left:10px;">
        <span>+${extra.quantidade}x ${extra.nome}</span>
        <span>R$ ${totalExtra.toFixed(2)}</span>
        </div>
        `;
      });
    }

    total += subtotal;

    div.innerHTML = `
    <div style="display:flex; justify-content:space-between;">
    <span>${quantidade}x ${item.nome || "Item"}</span>
    <span>R$ ${(quantidade * preco).toFixed(2)}</span>
    </div>

    ${extrasHtml}

    <div style="font-weight:bold; margin-top:5px;">
    Subtotal: R$ ${subtotal.toFixed(2)}
    </div>

    <div style="display:flex; gap:10px; margin-top:8px;">
    <button onclick="editarItem(${index})">Editar</button>
    <button onclick="removerItem(${index})" style="background:red;color:#fff;">Excluir</button>
    </div>
    `;

    container.appendChild(div);
  });

  container.innerHTML += `<div class="total">Total: R$ ${total.toFixed(2)}</div>`;

  container.innerHTML += `
  <h3>Dados do Pedido</h3>

  <input id="nome" placeholder="Seu nome">
  <input id="telefone" placeholder="Telefone">
  <input id="endereco" placeholder="Endereço">
  <input id="referencia" placeholder="Referência (opcional)">

  <select id="pagamento" onchange="verTroco()">
  <option value="">Forma de pagamento</option>
  <option>Dinheiro</option>
  <option>Pix</option>
  <option>Cartão</option>
  </select>

  <input id="troco" placeholder="Troco para quanto?" style="display:none;">
  `;

  atualizarBadge();
}

function editarItem(index){
  let item = carrinho[index];

  if(!item) return;

  localStorage.setItem("editandoItem", JSON.stringify({
    index:index,
    ...item
  }));

  // 👉 PRIORIDADE: usar página salva
  if(item.pagina){
    window.location.href = item.pagina;
    return;
  }

  // fallback
  window.location.href = "index.html";
}

function removerItem(index){
  carrinho.splice(index,1);
  localStorage.setItem("carrinho", JSON.stringify(carrinho));
  renderizar();
}

function verTroco(){
  let pagamento = document.getElementById("pagamento").value;
  let troco = document.getElementById("troco");

  if(troco){
    troco.style.display = pagamento === "Dinheiro" ? "block" : "none";
  }
}

function finalizarPedido(){

  if(!carrinho || carrinho.length === 0){
    alert("Seu carrinho está vazio");
    return;
  }

  let temComida = carrinho.some(item => item.tipo === "comida");

  if(!temComida){
    alert("Adicione pelo menos 1 caldo ao pedido");
    return;
  }

  let totalPedido = 0;

  carrinho.forEach(item=>{
    totalPedido += (item.quantidade || 0) * (item.preco || 0);

    if(item.extras){
      item.extras.forEach(extra=>{
        totalPedido += (extra.quantidade || 0) * (extra.preco || 0);
      });
    }
  });

  if(totalPedido < 20){
    alert("Pedido mínimo de R$20,00");
    return;
  }

  let nome = document.getElementById("nome").value.trim();
  let telefone = document.getElementById("telefone").value.trim();
  let endereco = document.getElementById("endereco").value.trim();
  let pagamento = document.getElementById("pagamento").value;

  if(!nome || !telefone || !endereco || !pagamento){
    alert("Preencha todos os campos obrigatórios");
    return;
  }

  alert("Pedido enviado com sucesso!");
}

renderizar();
</script>
