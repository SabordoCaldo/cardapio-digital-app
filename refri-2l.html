<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refrigerante 2L</title>

<style>
body{margin:0;font-family:Arial;background:#fff;margin-top:60px;padding-bottom:100px;}

.topo{
  position:fixed;
  top:0;
  left:0;
  right:0;
  background:#8B4513;
  color:#fff;
  padding:4px;
  display:flex;
  justify-content:flex-end;
  align-items:center;
}

.voltar-btn{
  width:40px;
  height:40px;
  background:#eee;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}

.voltar-btn svg{
  width:20px;
  height:20px;
  stroke:#8B4513;
}

.img{width:100%;height:320px;object-fit:cover;}

.conteudo{
  padding:15px;
  padding-bottom:140px;
}

.preco{
  font-size:22px;
  font-weight:bold;
  margin-top:10px;
}

.item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
}

.contador{
  display:flex;
  align-items:center;
  gap:8px;
}

.contador button{
  width:32px;
  height:32px;
  border:none;
  border-radius:8px;
}

.menos{background:#ccc;}
.mais{background:#8B4513;color:#fff;}

.botao{
  position:fixed;
  bottom:80px;
  left:10px;
  right:10px;
  background:#25D366;
  color:#fff;
  padding:14px;
  border-radius:12px;
  text-align:center;
  font-weight:bold;
}

.menu{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  border-top:1px solid #eee;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
}

.item-menu{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:12px;
  color:#555;
  text-decoration:none;
  position:relative;
}

.item-menu svg{
  width:26px;
  height:26px;
  stroke:#555;
  margin-bottom:4px;
}
</style>
</head>

<body>

<div class="topo">
<a href="javascript:void(0)" onclick="history.back()" class="voltar-btn">
  <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
    <path d="M15 18l-6-6 6-6"/>
  </svg>
</a>
</div>

<img src="img/banners/2litros_banner.jpg" class="img">

<div class="conteudo">

<h2>Refrigerante 2 Litros</h2>

<p>Escolha entre Coca-Cola, Coca Zero, Fanta ou Guaraná.</p>

<div class="preco">R$ 16,00</div>

<div class="item">
<span>Coca-Cola</span>
<div class="contador">
<button class="menos" onclick="alterar(this,-1)">-</button>
<span>0</span>
<button class="mais" onclick="alterar(this,1)">+</button>
</div>
</div>

<div class="item">
<span>Coca-Cola Zero</span>
<div class="contador">
<button class="menos" onclick="alterar(this,-1)">-</button>
<span>0</span>
<button class="mais" onclick="alterar(this,1)">+</button>
</div>
</div>

<div class="item">
<span>Fanta Laranja</span>
<div class="contador">
<button class="menos" onclick="alterar(this,-1)">-</button>
<span>0</span>
<button class="mais" onclick="alterar(this,1)">+</button>
</div>
</div>

<div class="item">
<span>Guaraná Antártica</span>
<div class="contador">
<button class="menos" onclick="alterar(this,-1)">-</button>
<span>0</span>
<button class="mais" onclick="alterar(this,1)">+</button>
</div>
</div>

</div>

<a class="botao" onclick="add()">Adicionar ao carrinho</a>

<!-- MENU -->
<div class="menu">

<a href="index.html" class="item-menu">
<svg viewBox="0 0 24 24" fill="none" stroke-width="2">
<path d="M3 10 L12 3 L21 10 V21 H3 Z"/>
</svg>
Início
</a>

<a href="#" class="item-menu">
<svg viewBox="0 0 24 24" fill="none" stroke-width="2">
<circle cx="7" cy="7" r="2"></circle>
<circle cx="17" cy="17" r="2"></circle>
<line x1="7" y1="17" x2="17" y2="7"></line>
</svg>
Promoções
</a>

<a href="carrinho.html" class="item-menu">
<span id="qtdCarrinho" style="position:absolute;top:-5px;right:-10px;background:red;color:#fff;font-size:10px;padding:2px 6px;border-radius:10px;">0</span>

<svg viewBox="0 0 24 24" fill="none" stroke-width="2">
<circle cx="9" cy="21" r="1"/>
<circle cx="20" cy="21" r="1"/>
<path d="M1 1 H5 L7 14 H19 L23 6 H6"/>
</svg>
Carrinho
</a>

<a href="perfil.html" class="item-menu">
<svg viewBox="0 0 24 24" fill="none" stroke-width="2">
<circle cx="12" cy="8" r="4"/>
<path d="M4 21 C4 16,20 16,20 21"/>
</svg>
Perfil
</a>

</div>

<script>

function alterar(botao, valor){
  let numero = botao.parentElement.querySelector("span");
  let atual = parseInt(numero.innerText)||0;

  atual += valor;
  if(atual<0) atual = 0;

  numero.innerText = atual;
}

function add(){

let itens = document.querySelectorAll(".item");
let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
let adicionou = false;

itens.forEach(item=>{
let nome = item.querySelector("span").innerText;
let qtd = parseInt(item.querySelector(".contador span").innerText);

if(qtd>0){
carrinho.push({
nome:nome,
quantidade:qtd,
preco:16,
tipo:"bebida"
});
adicionou = true;
}
});

if(!adicionou){
alert("Selecione pelo menos 1 item");
return;
}

localStorage.setItem("carrinho", JSON.stringify(carrinho));

atualizarCarrinho();
alert("Adicionado ao carrinho");
}

function atualizarCarrinho(){
let carrinho = JSON.parse(localStorage.getItem("carrinho"))||[];
let total = 0;
carrinho.forEach(item=> total += item.quantidade);
document.getElementById("qtdCarrinho").innerText = total;
}

atualizarCarrinho();

</script>

</body>
</html>
