<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perfil</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial;
  background:#fff;
  margin-top:60px;
  padding-bottom:120px;
}

.topo{
  position:fixed;
  top:0;
  left:0;
  right:0;
  background:#8B4513;
  padding:4px;
  display:flex;
  justify-content:flex-end;
  align-items:center;
}

.voltar-btn{
  width:40px;
  height:40px;
  background:#eee;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}

.voltar-btn svg{
  width:20px;
  height:20px;
  stroke:#8B4513;
}

.conteudo{
  padding:20px;
}

.opcao{
  width:100%;
  padding:15px;
  margin-bottom:10px;
  border:none;
  border-radius:10px;
  background:#8B4513;
  color:#fff;
  font-size:16px;
  text-align:center;
  text-decoration:none;
  display:block;
}

/* MENU */
.menu{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  border-top:1px solid #eee;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
}

.item-menu{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:13px;
  color:#555;
  text-decoration:none;
  position:relative;
}

.item-menu svg{
  width:26px;
  height:26px;
  stroke:#555;
  margin-bottom:4px;
}

.badge{
  position:absolute;
  top:-5px;
  right:-10px;
  background:red;
  color:#fff;
  font-size:10px;
  padding:2px 6px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="topo">
<a href="javascript:void(0)" onclick="voltar()" class="voltar-btn">
<svg viewBox="0 0 24 24" fill="none" stroke-width="2">
<path d="M15 18l-6-6 6-6"/>
</svg>
</a>
</div>

<div class="conteudo">

<h2>Perfil</h2>

<!-- 🔥 BOTÃO HISTÓRICO -->
<a href="historico.html" class="opcao">
Ver histórico de pedidos
</a>

</div>

<!-- MENU -->
<div class="menu">

<a href="index.html" class="item-menu">
<svg viewBox="0 0 24 24" fill="none" stroke-width="2">
<path d="M3 10L12 3l9 7"></path>
<path d="M5 10v10h14V10"></path>
</svg>
Início
</a>

<a href="#" class="item-menu">
<svg viewBox="0 0 24 24" fill="none" stroke-width="2">
<circle cx="7" cy="7" r="2"></circle>
<circle cx="17" cy="17" r="2"></circle>
<line x1="7" y1="17" x2="17" y2="7"></line>
</svg>
Promoções
</a>

<a href="carrinho.html" class="item-menu">
<span id="qtdCarrinho" class="badge">0</span>
<svg viewBox="0 0 24 24" fill="none" stroke-width="2">
<circle cx="9" cy="20" r="1"/>
<circle cx="17" cy="20" r="1"/>
<path d="M5 6h2l1 7h9l2-5H7"/>
</svg>
Carrinho
</a>

<a href="perfil.html" class="item-menu">
<svg viewBox="0 0 24 24" fill="none" stroke-width="2">
<circle cx="12" cy="8" r="4"/>
<path d="M4 20c2-4 14-4 16 0"/>
</svg>
Perfil
</a>

</div>

<script>
function voltar(){
  if(history.length > 1){
    history.back();
  }else{
    window.location.href = "index.html";
  }
}

function atualizarCarrinho(){
  let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
  let total = 0;

  carrinho.forEach(item=>{
    total += item.quantidade;
  });

  let badge = document.getElementById("qtdCarrinho");
  if(badge){
    badge.innerText = total;
  }
}

// 🔥 EXECUTA
atualizarCarrinho();
</script>

</body>
</html>
