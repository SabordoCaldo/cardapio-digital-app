<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caldo Completo</title>

<style>
body{margin:0;font-family:Arial;background:#fff;margin-top:60px;padding-bottom:100px;}

.topo{
  position:fixed;
  top:0;
  left:0;
  right:0;
  background:#8B4513;
  color:#fff;
  padding:4px;
  display:flex;
  justify-content:flex-end;
  align-items:center;
}

.img{width:100%;height:320px;object-fit:cover;}

.conteudo{
  padding:15px;
  padding-bottom:140px;
}

.preco{
  font-size:22px;
  font-weight:bold;
  margin-top:10px;
}

.item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
}

.contador{
  display:flex;
  gap:8px;
  align-items:center;
}

.contador button{
  width:32px;
  height:32px;
  border:none;
  border-radius:8px;
}

.menos{background:#ccc;}
.mais{background:#8B4513;color:#fff;}

.botao{
  position:fixed;
  bottom:80px;
  left:10px;
  right:10px;
  background:#25D366;
  color:#fff;
  padding:14px;
  border-radius:12px;
  text-align:center;
  font-weight:bold;
}

/* MENU */
.menu{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#fff;
  border-top:1px solid #eee;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
}

.item-menu{
  display:flex;
  flex-direction:column;
  align-items:center;
  font-size:12px;
  color:#555;
  text-decoration:none;
  position:relative;
}

.item-menu svg{
  width:24px;
  height:24px;
  stroke:#555;
  margin-bottom:4px;
}
</style>
</head>

<body>

<div class="topo">
<a href="#" onclick="history.back()" class="voltar-btn">
  <svg viewBox="0 0 24 24" fill="none" stroke-width="2">
    <path d="M15 18l-6-6 6-6"/>
  </svg>
</a>
</div>

<img src="img/banners/completo_banner.jpg" class="img">

<div class="conteudo">

<h2>Caldo Completo</h2>

<p>Pote 500g - Feijão cremoso com calabresa, bacon, ovos e mussarela.</p>

<div class="item">
<span>Caldo Completo</span>

<div class="contador" id="contadorCaldo">
<button class="menos" onclick="alt(-1)">-</button>
<span>0</span>
<button class="mais" onclick="alt(1)">+</button>
</div>
</div>

<h3>Adicionais</h3>
<div id="extras"></div>

<div class="preco">Total: R$ <span id="totalPreco">25.00</span></div>

</div>

<a class="botao" onclick="add()">Adicionar ao carrinho</a>

<!-- MENU -->
<div class="menu">

<a href="index.html" class="item-menu">
<svg fill="none" stroke-width="2" viewBox="0 0 24 24">
<path d="M3 10L12 3l9 7"></path>
<path d="M5 10v10h14V10"></path>
</svg>
Início
</a>

<a href="#" class="item-menu">
<svg fill="none" stroke-width="2" viewBox="0 0 24 24">
<circle cx="7" cy="7" r="2"></circle>
<circle cx="17" cy="17" r="2"></circle>
<line x1="7" y1="17" x2="17" y2="7"></line>
</svg>
Promoções
</a>

<a href="carrinho.html" class="item-menu">
<span id="qtdCarrinho" style="position:absolute;top:-5px;right:-10px;background:red;color:#fff;font-size:10px;padding:2px 6px;border-radius:10px;">0</span>

<svg fill="none" stroke-width="2" viewBox="0 0 24 24">
<circle cx="9" cy="20" r="1"/>
<circle cx="17" cy="20" r="1"/>
<path d="M5 6h2l1 7h9l2-5H7"/>
</svg>
Carrinho
</a>

<a href="perfil.html" class="item-menu">
<svg fill="none" stroke-width="2" viewBox="0 0 24 24">
<circle cx="12" cy="8" r="4"/>
<path d="M4 20c2-4 14-4 16 0"/>
</svg>
Perfil
</a>

</div>

<script>

let adicionais = [
{id:1,nome:"Cheiro verde extra",preco:1},
{id:2,nome:"Ovo de codorna",preco:1},
{id:3,nome:"Pimenta biquinho",preco:1},
{id:4,nome:"Torrada",preco:1.5},
{id:5,nome:"Torresmo",preco:5},
{id:6,nome:"Calabresa",preco:5},
{id:7,nome:"Bacon",preco:5},
{id:8,nome:"Mussarela",preco:6}
];

let extrasSelecionados = {};

function renderExtras(){
  let container = document.getElementById("extras");

  adicionais.forEach(item=>{
    extrasSelecionados[item.id] = 0;

    let div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <span>${item.nome} (R$ ${item.preco.toFixed(2)})</span>
      <div class="contador">
        <button class="menos" onclick="altExtra(${item.id}, -1)">-</button>
        <span id="extra-${item.id}">0</span>
        <button class="mais" onclick="altExtra(${item.id}, 1)">+</button>
      </div>
    `;

    container.appendChild(div);
  });
}

function alt(valor){
  let span = document.querySelector("#contadorCaldo span");
  let n = parseInt(span.innerText)||0;
  n+=valor;
  if(n<0)n=0;
  span.innerText=n;
  atualizarTotal();
}

function altExtra(id,valor){

  let qtdCaldo = parseInt(document.querySelector("#contadorCaldo span").innerText) || 0;

  if(qtdCaldo <= 0){
    alert("Selecione o caldo primeiro");
    return;
  }

  if(!extrasSelecionados[id]){
    extrasSelecionados[id] = 0;
  }

  let totalExtras = 0;
  Object.values(extrasSelecionados).forEach(q=> totalExtras += q || 0);

  if(valor > 0 && totalExtras >= qtdCaldo * 5) return;

  extrasSelecionados[id] += valor;

  if(extrasSelecionados[id] < 0){
    extrasSelecionados[id] = 0;
  }

  document.getElementById(`extra-${id}`).innerText = extrasSelecionados[id];

  atualizarTotal();
}

function atualizarTotal(){
  let qtd = parseInt(document.querySelector("#contadorCaldo span").innerText) || 0;
  let total = qtd * 25;

  adicionais.forEach(item=>{
    let q = extrasSelecionados[item.id] || 0;
    total += q * item.preco;
  });

  document.getElementById("totalPreco").innerText = total.toFixed(2);
}

function add(){
  let qtd = parseInt(document.querySelector("#contadorCaldo span").innerText);

  if(qtd <= 0){
    alert("Selecione pelo menos 1 item");
    return;
  }

  let c = JSON.parse(localStorage.getItem("carrinho")) || [];

  let extrasArray = [];

  adicionais.forEach(item=>{
    let q = extrasSelecionados[item.id];
    if(q > 0){
      extrasArray.push({nome:item.nome,quantidade:q,preco:item.preco});
    }
  });

  c.push({
    nome:"Caldo Completo",
    quantidade:qtd,
    preco:25,
    tipo:"comida",
    extras:extrasArray
  });

  localStorage.setItem("carrinho", JSON.stringify(c));

  // 🔥 RESET CORRIGIDO
  extrasSelecionados = {};
  adicionais.forEach(item=>{
    extrasSelecionados[item.id] = 0;
  });

  document.querySelectorAll("[id^='extra-']").forEach(el=>el.innerText="0");
  document.querySelector("#contadorCaldo span").innerText="0";

  atualizarTotal();

  alert("Adicionado ao carrinho");
}

function atualizarCarrinho(){
  let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
  let total = 0;
  carrinho.forEach(item=> total += item.quantidade);
  let badge = document.getElementById("qtdCarrinho");
  if(badge){ badge.innerText = total; }
}

window.addEventListener("pageshow", function(event){
  if(event.persisted){
    location.reload();
  }
});

renderExtras();
atualizarTotal();
atualizarCarrinho();

</script>

</body>
  </html>
