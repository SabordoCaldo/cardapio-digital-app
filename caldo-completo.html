<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caldo Completo</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#fff;
  margin-top:60px;
}

.topo {
  position:fixed;
  top:0;
  left:0;
  right:0;
  background:#8B4513;
  color:#fff;
  padding:12px;
  z-index:1000;
}

.topo a {
  color:#fff;
  text-decoration:none;
}

#iconeCarrinho {
  float:right;
  color:#fff;
}

.img {
  width:100%;
  height:320px;
  object-fit:cover;
}

.conteudo {
  padding:15px;
  padding-bottom:120px;
}

.preco {
  font-size:22px;
  font-weight:bold;
  margin-top:10px;
}

.item {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
}

.contador {
  display:flex;
  align-items:center;
  gap:8px;
}

.contador button {
  width:32px;
  height:32px;
  border:none;
  border-radius:8px;
  font-size:18px;
}

.menos { background:#ccc; }

.mais {
  background:#8B4513;
  color:#fff;
}

.botao {
  position:fixed;
  bottom:10px;
  left:10px;
  right:10px;
  z-index:1000;
  text-align:center;
  padding:14px;
  border-radius:12px;
  text-decoration:none;
  font-weight:bold;
  background:#25D366;
  color:#fff;
}
</style>
</head>

<body>

<div class="topo">
<a href="index.html">← Voltar</a>

<a href="carrinho.html" id="iconeCarrinho">
🛒 <span id="qtdCarrinho">0</span>
</a>
</div>

<img src="img/banners/completo_banner.jpg" class="img">

<div class="conteudo">

<h2>Caldo Completo</h2>

<p>
Pote 500g - Feijão cremoso e bem temperado, recheado com calabresa, bacon, 3 ovos de codorna e mussarela em cubos.<br><br>
Acompanha torresmo crocante, torradas sequinhas e cheiro verde fresco.
</p>

<div class="preco">R$ 25,00</div>

<div class="item">
<span>Caldo Completo</span>
<div class="contador">
<button class="menos" onclick="alterar(this, -1)">-</button>
<span>0</span>
<button class="mais" onclick="alterar(this, 1)">+</button>
</div>
</div>

</div>

<a href="#" class="botao" onclick="adicionarCarrinho()">
Adicionar ao carrinho
</a>

<script>
function alterar(botao, valor) {
  let numero = botao.parentElement.querySelector("span");
  let atual = parseInt(numero.innerText);

  atual += valor;
  if (atual < 0) atual = 0;

  numero.innerText = atual;
}

function adicionarCarrinho() {
  let qtd = parseInt(document.querySelector(".contador span").innerText);

  if (qtd <= 0) {
    alert("Selecione pelo menos 1 item");
    return;
  }

  let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];

  carrinho.push({
    nome: "Caldo Completo",
    quantidade: qtd,
    preco: 25,
    tipo: "comida"
  });

  localStorage.setItem("carrinho", JSON.stringify(carrinho));

  atualizarCarrinho();
  alert("Adicionado ao carrinho");
}

function atualizarCarrinho() {
  let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
  let total = 0;

  carrinho.forEach(item => {
    total += item.quantidade;
  });

  document.getElementById("qtdCarrinho").innerText = total;
}

atualizarCarrinho();
</script>

</body>
</html>
