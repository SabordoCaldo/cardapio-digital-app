<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sabor do Caldo</title>

<style>

body { margin:0; font-family:Arial; background:#fff; }

header {
  background:#8B4513;
  color:#fff;
  text-align:center;
  padding:15px;
}

header img { width:120px; }

.categoria {
  padding:10px;
  font-weight:bold;
  font-size:18px;
  background:#f5f5f5;
}

.produto {
  display:flex;
  gap:10px;
  padding:10px;
  border-bottom:1px solid #eee;
}

.produto img {
  width:90px;
  height:90px;
  border-radius:10px;
  object-fit:cover;
}

.botao {
  background:#c40000;
  color:#fff;
  border:none;
  padding:6px;
  border-radius:5px;
}

/* CARRINHO */
#carrinho {
  position:fixed;
  right:0;
  top:0;
  width:260px;
  height:100%;
  background:#fff;
  border-left:2px solid #eee;
  overflow:auto;
  padding:10px;
  z-index:1000;
}

.item {
  border-bottom:1px solid #eee;
  padding:5px 0;
}

.qtd {
  display:flex;
  gap:5px;
}

.finalizar {
  position: fixed;
  bottom: 10px;
  left: 5%;
  width: 90%;
  padding:15px;
  background:#c40000;
  color:#fff;
  border:none;
  border-radius:10px;
  z-index:999;
}

</style>
</head>

<body>

<header>
  <img src="logo.png">
  <h1>Sabor do Caldo</h1>
  <p>Sabor que conquista</p>
</header>

<!-- CALDOS -->
<div class="categoria">🍲 Caldos</div>

<div class="produto">
<img src="tradicional.jpg">
<div>
<b>Caldo Tradicional</b><br>R$ 20,00<br>

<select id="add1">
<option value="">Sem adicional</option>
<option value="Bacon|5">Bacon +5</option>
<option value="Calabresa|5">Calabresa +5</option>
</select><br>

<button class="botao" onclick="addItem('Caldo Tradicional',20,'add1')">Adicionar</button>
</div>
</div>

<div class="produto">
<img src="completo.jpg">
<div>
<b>Caldo Completo</b><br>R$ 25,00<br>
<button class="botao" onclick="addItem('Caldo Completo',25)">Adicionar</button>
</div>
</div>

<!-- BEBIDAS -->
<div class="categoria">🥤 Bebidas</div>

<div class="produto">
<img src="lata.jpg">
<div>
<b>Lata 350ml</b><br>R$ 6,50<br>
<button class="botao" onclick="addItem('Lata',6.5)">Adicionar</button>
</div>
</div>

<!-- CARRINHO -->
<div id="carrinho">
<h3>Carrinho</h3>
<div id="lista"></div>
<div id="total">Total: R$ 0,00</div>
</div>

<button class="finalizar" onclick="finalizarPedido()">Finalizar Pedido</button>

<div style="height:120px;"></div>

<script>

let carrinho = [];

function addItem(nome, preco, selectId=null){

let adicional = "";
let precoFinal = preco;

if(selectId){
let val = document.getElementById(selectId).value;
if(val){
let parts = val.split("|");
adicional = " + " + parts[0];
precoFinal += parseFloat(parts[1]);
}
}

let item = carrinho.find(i => i.nome === nome + adicional);

if(item){
item.qtd++;
}else{
carrinho.push({nome:nome+adicional, preco:precoFinal, qtd:1});
}

render();
}

function render(){

let lista = document.getElementById("lista");
lista.innerHTML = "";

let total = 0;

carrinho.forEach((item, index)=>{

total += item.preco * item.qtd;

lista.innerHTML += `
<div class="item">
${item.qtd}x ${item.nome}<br>
R$ ${(item.preco * item.qtd).toFixed(2)}

<div class="qtd">
<button onclick="menos(${index})">-</button>
<button onclick="mais(${index})">+</button>
</div>
</div>
`;
});

document.getElementById("total").innerText =
"Total: R$ " + total.toFixed(2);
}

function mais(i){
carrinho[i].qtd++;
render();
}

function menos(i){
carrinho[i].qtd--;
if(carrinho[i].qtd <= 0){
carrinho.splice(i,1);
}
render();
}

function finalizarPedido(){

if(carrinho.length === 0){
alert("Adicione itens");
return;
}

let msg = "SABOR DO CALDO\n----------------\n";

carrinho.forEach(i=>{
msg += `${i.qtd}x ${i.nome} - R$ ${(i.preco*i.qtd).toFixed(2)}\n`;
});

window.open("https://wa.me/5535999711358?text="+encodeURIComponent(msg));
}

</script>

</body>
</html>
